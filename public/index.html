<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful full-stack To-Do List application to manage your tasks efficiently." />
  <title>Todo List — Stay Organized</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Splash Intro -->
  <div class="splash-overlay" id="splash">
    <span class="splash-logo">✦</span>
    <span class="splash-title">Todo List</span>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <h1>Todo List</h1>
      </div>
      <p class="subtitle">Organize your day, one task at a time.</p>
    </header>

    <!-- Task Form -->
    <section class="card form-card" aria-label="Add new task">
      <form id="task-form" autocomplete="off">
        <div class="form-group">
          <label for="task-name">Task Name</label>
          <input type="text" id="task-name" placeholder="e.g. Finish project report" required />
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" rows="2" placeholder="Add some details…"></textarea>
        </div>
        <button type="submit" id="add-task-btn" class="btn-primary">
          <span class="btn-icon">＋</span> Add Task
        </button>
      </form>
    </section>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <span id="stats-total">0 tasks</span>
      <span id="stats-completed">0 completed</span>
    </div>

    <!-- Task List -->
    <section id="task-list" class="task-list" aria-label="Task list">
      <!-- Tasks rendered here by JS -->
    </section>

    <div id="empty-state" class="empty-state">
      <span class="empty-icon">📋</span>
      <p>No tasks yet — add one above!</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
